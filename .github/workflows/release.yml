name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Bun version for the release (e.g. 1.3.13)"
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - ".bun-version"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(cat .bun-version)
          fi
          echo "bun_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bun version: ${VERSION}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release
        run: bunx projen release
        env:
          BUN_VERSION: ${{ steps.version.outputs.bun_version }}

      - name: Read package version
        id: pkg
        run: |
          VERSION=$(cat dist/version.txt)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.pkg.outputs.version }}"
          name: "v${{ steps.pkg.outputs.version }}"
          body: |
            ## Lambda Bun Runtime v${{ steps.pkg.outputs.version }}

            Built with Bun v${{ steps.version.outputs.bun_version }}

            ### Assets
            - `bun-lambda-layer-${{ steps.version.outputs.bun_version }}.zip` — Prebuilt Lambda layer (Linux ARM64)
          files: "lib/bun-lambda-layer-${{ steps.version.outputs.bun_version }}.zip"
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: bunx projen publish:npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
