name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Bun version for the release (e.g. 1.3.14)"
        required: true
        type: string
  push:
    branches: [main]
    paths: [".bun-version"]

jobs:
  integration_test:
    uses: ./.github/workflows/integration.yml
    secrets: inherit

  release:
    needs: integration_test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve bun version
        id: bun
        run: |
          VERSION="${{ inputs.version || '' }}"
          if [ -z "$VERSION" ]; then VERSION=$(cat .bun-version); fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute package version
        id: pkg
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.bun.outputs.version }}"
          PKG_MINOR=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version=3.${PKG_MINOR}.0" >> "$GITHUB_OUTPUT"
          echo "Package version: 3.${PKG_MINOR}.0 (from Bun v${{ steps.bun.outputs.version }})"

      - name: Check if already released
        id: check
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag ${TAG} already exists. Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.check.outputs.skip == 'false'
        with:
          bun-version-file: .bun-version

      - uses: actions/setup-node@v6
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile
        if: steps.check.outputs.skip == 'false'

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: bun run build
        env:
          BUN_VERSION: ${{ steps.bun.outputs.version }}

      - name: Set version and pack
        if: steps.check.outputs.skip == 'false'
        run: |
          npm version "${{ steps.pkg.outputs.version }}" --no-git-tag-version
          npm pack

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.pkg.outputs.version }}"
          name: "v${{ steps.pkg.outputs.version }}"
          body: |
            ## Lambda Bun Runtime v${{ steps.pkg.outputs.version }}

            Built with Bun v${{ steps.bun.outputs.version }}

            ### Versioning
            Package version `3.X.Y` where `X = bun_major*10000 + bun_minor*100 + bun_patch` and `Y` is the internal patch.

            ### Assets
            - `bun-lambda-layer-${{ steps.bun.outputs.version }}.zip` — Prebuilt Lambda layer (Linux ARM64)
          files: "dist/bun-lambda-layer-${{ steps.bun.outputs.version }}.zip"
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: npm publish *.tgz --provenance --access public
